name: Build & Publish Android App

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bubblewrap CLI
        run: npm install -g @nicksaiz/nicksaiz

      - name: Decode keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > /tmp/keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Create TWA project
        env:
          APP_HOST: ${{ vars.APP_HOST }}
          PACKAGE_ID: ${{ vars.ANDROID_PACKAGE_ID }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          mkdir -p android-build
          node -e "
          const fs = require('fs');
          const manifest = {
            packageId: process.env.PACKAGE_ID,
            host: process.env.APP_HOST,
            name: 'ApproachAI - Your Cold Approach Wingman',
            launcherName: 'ApproachAI',
            display: 'standalone',
            themeColor: '#1a1a1a',
            themeColorDark: '#1a1a1a',
            navigationColor: '#1a1a1a',
            navigationColorDark: '#1a1a1a',
            navigationDividerColor: '#1a1a1a',
            navigationDividerColorDark: '#1a1a1a',
            backgroundColor: '#fafafa',
            enableSiteSettingsShortcut: true,
            startUrl: '/',
            iconUrl: 'https://' + process.env.APP_HOST + '/icons/icon-512.png',
            maskableIconUrl: 'https://' + process.env.APP_HOST + '/icons/icon-maskable-512.png',
            shortcuts: [],
            signingKey: {
              path: '/tmp/keystore.jks',
              alias: process.env.KEY_ALIAS
            },
            appVersionCode: parseInt(process.env.RUN_NUMBER),
            appVersion: '1.0.' + process.env.RUN_NUMBER,
            generatorApp: 'nicksaiz-cli',
            webManifestUrl: 'https://' + process.env.APP_HOST + '/manifest.json',
            fallbackType: 'customtabs',
            enableNotifications: false,
            isChromeOSOnly: false,
            orientation: 'portrait',
            fingerprints: []
          };
          fs.writeFileSync('android-build/twa-manifest.json', JSON.stringify(manifest, null, 2));
          console.log('Created twa-manifest.json');
          "

      - name: Initialize and build TWA
        working-directory: android-build
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          APP_HOST: ${{ vars.APP_HOST }}
        run: |
          echo "Initializing from manifest URL..."
          bubblewrap init --manifest "https://${APP_HOST}/manifest.json" --directory . <<EOF
          ${KEYSTORE_PASSWORD}
          ${KEY_PASSWORD}
          EOF

          echo "Building..."
          bubblewrap build --skipPwaValidation <<EOF
          ${KEYSTORE_PASSWORD}
          ${KEY_PASSWORD}
          EOF

      - name: List build outputs
        run: |
          echo "=== Build outputs ==="
          find android-build -name "*.aab" -o -name "*.apk" | sort

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: approachai-android-v1.0.${{ github.run_number }}
          path: |
            android-build/*.aab
            android-build/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Publish to Google Play
        if: env.HAS_PLAY_KEY == 'true'
        env:
          HAS_PLAY_KEY: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ vars.ANDROID_PACKAGE_ID }}
          releaseFiles: android-build/*.aab
          track: internal
          status: completed
