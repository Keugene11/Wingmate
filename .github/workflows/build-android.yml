name: Build & Publish Android App

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bubblewrap
        run: npm install -g @nicksaiz/nicksaiz || npm install -g @nicksaiz/nicksaiz@latest

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/keystore.jks

      - name: Download icon files
        run: |
          mkdir -p /tmp/icons
          curl -sL "https://${{ vars.APP_HOST }}/icons/icon-512.png" -o /tmp/icons/icon-512.png
          curl -sL "https://${{ vars.APP_HOST }}/icons/icon-maskable-512.png" -o /tmp/icons/icon-maskable-512.png

      - name: Initialize Bubblewrap project
        run: |
          mkdir -p android-build && cd android-build

          # Create twa-manifest.json
          cat > twa-manifest.json << EOF
          {
            "packageId": "${{ vars.ANDROID_PACKAGE_ID }}",
            "host": "${{ vars.APP_HOST }}",
            "name": "ApproachAI - Your Cold Approach Wingman",
            "launcherName": "ApproachAI",
            "display": "standalone",
            "themeColor": "#1a1a1a",
            "themeColorDark": "#1a1a1a",
            "navigationColor": "#1a1a1a",
            "navigationColorDark": "#1a1a1a",
            "navigationDividerColor": "#1a1a1a",
            "navigationDividerColorDark": "#1a1a1a",
            "backgroundColor": "#fafafa",
            "enableSiteSettingsShortcut": true,
            "startUrl": "/",
            "iconUrl": "https://${{ vars.APP_HOST }}/icons/icon-512.png",
            "maskableIconUrl": "https://${{ vars.APP_HOST }}/icons/icon-maskable-512.png",
            "shortcuts": [],
            "signingKey": {
              "path": "/tmp/keystore.jks",
              "alias": "${{ secrets.KEY_ALIAS }}"
            },
            "appVersionCode": ${{ github.run_number }},
            "appVersion": "1.0.${{ github.run_number }}",
            "generatorApp": "nicksaiz-cli",
            "webManifestUrl": "https://${{ vars.APP_HOST }}/manifest.json",
            "fallbackType": "customtabs",
            "enableNotifications": false,
            "isChromeOSOnly": false,
            "orientation": "portrait",
            "fingerprints": []
          }
          EOF

          # Run bubblewrap init
          bubblewrap init --manifest "https://${{ vars.APP_HOST }}/manifest.json" --directory .

      - name: Build signed AAB
        working-directory: android-build
        run: |
          bubblewrap build \
            --skipPwaValidation \
            --signingKeyPath /tmp/keystore.jks \
            --signingKeyAlias "${{ secrets.KEY_ALIAS }}" \
          <<EOF
          ${{ secrets.KEYSTORE_PASSWORD }}
          ${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Find outputs
        id: find-outputs
        run: |
          AAB=$(find android-build -name "*.aab" -o -name "*-signed*.apk" | head -1)
          if [ -z "$AAB" ]; then
            echo "No AAB/APK found, listing all files:"
            find android-build -type f -name "*.aab" -o -name "*.apk"
            exit 1
          fi
          echo "output_path=$AAB" >> "$GITHUB_OUTPUT"
          echo "Found: $AAB"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: approachai-android-v1.0.${{ github.run_number }}
          path: |
            android-build/*.aab
            android-build/*-signed*.apk
          retention-days: 90

      - name: Publish to Google Play (internal track)
        if: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ vars.ANDROID_PACKAGE_ID }}
          releaseFiles: ${{ steps.find-outputs.outputs.output_path }}
          track: internal
          status: completed
