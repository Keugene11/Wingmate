name: Build & Publish Android App

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-twa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > /tmp/keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Copy icon into Android resources
        run: |
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-mdpi
          cp ../public/icons/icon-512.png app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp ../public/icons/icon-192.png app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp ../public/icons/icon-192.png app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp ../public/icons/icon-192.png app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp ../public/icons/icon-192.png app/src/main/res/mipmap-mdpi/ic_launcher.png

      - name: Build release AAB and APK
        env:
          TWA_HOST: ${{ vars.APP_HOST }}
          TWA_PACKAGE_ID: ${{ vars.ANDROID_PACKAGE_ID }}
          TWA_VERSION_CODE: ${{ github.run_number }}
          TWA_VERSION_NAME: 1.0.${{ github.run_number }}
          KEYSTORE_FILE: /tmp/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          gradle wrapper --gradle-version 8.11.1
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease --no-daemon

      - name: List build outputs
        run: |
          echo "=== AAB files ==="
          find . -name "*.aab" -type f
          echo "=== APK files ==="
          find . -name "*.apk" -type f

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wingmate-android-v1.0.${{ github.run_number }}
          path: |
            android-twa/app/build/outputs/bundle/release/*.aab
            android-twa/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Check Play Store key availability
        id: play-key-check
        run: |
          if [ -n "$PLAY_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Play Store upload — GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret not set"
          fi
        env:
          PLAY_KEY: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}

      - name: Set up Ruby
        if: steps.play-key-check.outputs.available == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: android-twa

      - name: Publish to Google Play via Fastlane
        if: steps.play-key-check.outputs.available == 'true'
        env:
          ANDROID_PACKAGE_ID: ${{ vars.ANDROID_PACKAGE_ID }}
        run: |
          echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}' > play-store-key.json
          export GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_FILE="$(pwd)/play-store-key.json"
          bundle exec fastlane internal
          rm -f play-store-key.json

      - name: Clean up secrets
        if: always()
        run: |
          rm -f /tmp/keystore.jks
          rm -f play-store-key.json
