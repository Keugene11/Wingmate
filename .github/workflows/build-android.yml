name: Build & Publish Android App

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Capacitor Android
        run: |
          mkdir -p android/app/src/main/assets
          npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > /tmp/keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build release AAB and APK
        working-directory: android
        env:
          KEYSTORE_FILE: /tmp/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease --no-daemon

      - name: List build outputs
        working-directory: android
        run: |
          echo "=== AAB files ==="
          find . -name "*.aab" -type f
          echo "=== APK files ==="
          find . -name "*.apk" -type f

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wingmate-android-v2.0.${{ github.run_number }}
          path: |
            android/app/build/outputs/bundle/release/*.aab
            android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Check Play Store key availability
        id: play-key-check
        run: |
          if [ -n "$PLAY_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Play Store upload — GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret not set"
          fi
        env:
          PLAY_KEY: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}

      - name: Set up Ruby
        if: steps.play-key-check.outputs.available == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: android

      - name: Publish to Google Play via Fastlane
        if: steps.play-key-check.outputs.available == 'true'
        working-directory: android
        env:
          ANDROID_PACKAGE_ID: ${{ vars.ANDROID_PACKAGE_ID }}
        run: |
          echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}' > play-store-key.json
          export GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_FILE="$(pwd)/play-store-key.json"
          bundle exec fastlane internal
          bundle exec fastlane promote_to_closed
          rm -f play-store-key.json

      - name: Clean up secrets
        if: always()
        run: |
          rm -f /tmp/keystore.jks
          rm -f android/play-store-key.json
