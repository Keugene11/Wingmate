name: Build & Publish Android App

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Decode keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > /tmp/keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Initialize TWA project
        env:
          APP_HOST: ${{ vars.APP_HOST }}
          PACKAGE_ID: ${{ vars.ANDROID_PACKAGE_ID }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          mkdir -p android-build && cd android-build

          # Bubblewrap init prompts for passwords via stdin
          echo -e "${KEYSTORE_PASSWORD}\n${KEY_PASSWORD}" | bubblewrap init \
            --manifest "https://${APP_HOST}/manifest.json" \
            --directory .

      - name: Patch twa-manifest.json
        env:
          PACKAGE_ID: ${{ vars.ANDROID_PACKAGE_ID }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          RUN_NUMBER: ${{ github.run_number }}
        working-directory: android-build
        run: |
          node -e "
          const fs = require('fs');
          const m = JSON.parse(fs.readFileSync('twa-manifest.json', 'utf8'));
          m.packageId = process.env.PACKAGE_ID || m.packageId;
          m.signingKey = { path: '/tmp/keystore.jks', alias: process.env.KEY_ALIAS };
          m.appVersionCode = parseInt(process.env.RUN_NUMBER);
          m.appVersion = '1.0.' + process.env.RUN_NUMBER;
          fs.writeFileSync('twa-manifest.json', JSON.stringify(m, null, 2));
          console.log('Patched twa-manifest.json:', JSON.stringify(m, null, 2));
          "

      - name: Build signed AAB and APK
        working-directory: android-build
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo -e "${KEYSTORE_PASSWORD}\n${KEY_PASSWORD}" | bubblewrap build \
            --skipPwaValidation

      - name: List build outputs
        run: |
          echo "=== Build outputs ==="
          find android-build -maxdepth 1 \( -name "*.aab" -o -name "*.apk" \) | sort
          ls -la android-build/*.aab android-build/*.apk 2>/dev/null || echo "No AAB/APK found"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: approachai-android-v1.0.${{ github.run_number }}
          path: |
            android-build/*.aab
            android-build/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Publish to Google Play
        if: env.HAS_PLAY_KEY == 'true'
        env:
          HAS_PLAY_KEY: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ vars.ANDROID_PACKAGE_ID }}
          releaseFiles: android-build/*.aab
          track: internal
          status: completed
