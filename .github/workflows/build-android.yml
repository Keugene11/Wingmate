name: Build & Publish Android App

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-twa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > /tmp/keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Copy icon into Android resources
        run: |
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          cp ../public/icons/icon-512.png app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Build release AAB and APK
        env:
          TWA_HOST: ${{ vars.APP_HOST }}
          TWA_PACKAGE_ID: ${{ vars.ANDROID_PACKAGE_ID }}
          TWA_VERSION_CODE: ${{ github.run_number }}
          TWA_VERSION_NAME: 1.0.${{ github.run_number }}
          KEYSTORE_FILE: /tmp/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew 2>/dev/null || true
          gradle wrapper
          ./gradlew bundleRelease assembleRelease --no-daemon

      - name: List build outputs
        run: |
          echo "=== AAB files ==="
          find . -name "*.aab" -type f
          echo "=== APK files ==="
          find . -name "*.apk" -type f

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: approachai-android-v1.0.${{ github.run_number }}
          path: |
            android-twa/app/build/outputs/bundle/release/*.aab
            android-twa/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Publish to Google Play
        if: env.HAS_PLAY_KEY == 'true'
        env:
          HAS_PLAY_KEY: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ vars.ANDROID_PACKAGE_ID }}
          releaseFiles: android-twa/app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
